<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>chatApp v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --accent:      #6c63ff;
    --accent-dark: #574fd6;
    --accent-glow: rgba(108,99,255,.20);
    --bg:          #eef0f8;
    --surface:     #ffffff;
    --border:      #e4e6ef;
    --t1:          #1a1d2e;
    --t2:          #6b7080;
    --t3:          #9ba3b8;
    --online:      #22c55e;
    --font:        'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html, body {
    height: 100%;
    font-family: var(--font);
    font-size: 15px;
    background: var(--bg);
    color: var(--t1);
    -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; overflow: hidden; }

/* ══════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════ */
#username-page {
    flex: 1; display: flex; align-items: center; justify-content: center;
    height: 100%;
    background: linear-gradient(145deg, #e8e5ff 0%, #eef0f8 45%, #dceeff 100%);
    padding: 20px;
    position: relative;
    overflow: hidden;
}

/* Decorative blobs */
#username-page::before,
#username-page::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: .35;
    pointer-events: none;
}
#username-page::before {
    width: 400px; height: 400px;
    background: #c4bffe;
    top: -100px; left: -100px;
}
#username-page::after {
    width: 300px; height: 300px;
    background: #bae0ff;
    bottom: -80px; right: -60px;
}

.login-card {
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 28px;
    box-shadow: 0 12px 48px rgba(108,99,255,.18), 0 2px 8px rgba(0,0,0,.06);
    border: 1px solid rgba(255,255,255,.9);
    padding: 52px 48px 44px;
    width: 100%; max-width: 420px;
    text-align: center;
    position: relative; z-index: 1;
}

.logo-wrap {
    width: 72px; height: 72px; border-radius: 20px;
    background: linear-gradient(135deg, #7c74ff, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(108,99,255,.35);
    font-size: 32px; line-height: 1;
}

.login-logo h1 {
    font-size: 1.9rem; font-weight: 800;
    color: var(--accent); letter-spacing: -0.5px;
}
.login-subtitle { color: var(--t2); font-size: 14px; margin: 6px 0 36px; }

.input-with-icon {
    position: relative; margin-bottom: 14px;
}
.input-with-icon svg {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--t3); pointer-events: none;
}
.login-input {
    width: 100%; padding: 14px 18px 14px 44px;
    border: 2px solid var(--border); border-radius: 12px;
    font-size: 15px; font-family: var(--font);
    color: var(--t1); background: #f8f9ff; outline: none;
    -webkit-appearance: none; appearance: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
}
.login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
    background: #fff;
}
.login-input::placeholder { color: var(--t3); }

.login-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #7c74ff, var(--accent-dark));
    color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; font-family: var(--font);
    cursor: pointer; -webkit-appearance: none; appearance: none;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 6px 20px rgba(108,99,255,.38);
    letter-spacing: .2px;
}
.login-btn:hover { opacity: .92; box-shadow: 0 8px 28px rgba(108,99,255,.48); }
.login-btn:active { transform: scale(.98); }

.login-footer {
    margin-top: 20px; font-size: 12px; color: var(--t3);
    display: flex; align-items: center; justify-content: center; gap: 6px;
}
.login-footer span { width: 4px; height: 4px; background: var(--t3); border-radius: 50%; }

/* ══════════════════════════════════════
   CHAT PAGE
══════════════════════════════════════ */
#chat-page {
    flex: 1; display: flex; align-items: center; justify-content: center;
    height: 100%; padding: 16px;
}

.chat-container {
    width: 100%; max-width: 760px;
    height: 100%; max-height: 720px;
    background: var(--surface);
    border-radius: 24px;
    box-shadow: 0 12px 48px rgba(108,99,255,.14), 0 2px 8px rgba(0,0,0,.05);
    border: 1px solid rgba(255,255,255,.9);
    display: flex; flex-direction: column; overflow: hidden;
}

/* ── HEADER ── */
.chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: linear-gradient(135deg, #7c74ff 0%, #6c63ff 100%);
    flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.header-avatar {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; line-height: 1;
    border: 1px solid rgba(255,255,255,.3);
}

.header-title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.2px; }
.header-status { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 1px; }
.header-status.connected { color: #86efac; }

.header-right { display: flex; align-items: center; gap: 10px; }

.online-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.18);
    color: #fff; font-size: 13px; font-weight: 600;
    padding: 6px 14px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,.25);
    backdrop-filter: blur(4px);
}
.online-dot {
    width: 7px; height: 7px; background: #86efac;
    border-radius: 50%; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── DATE DIVIDER ── */
.date-divider {
    text-align: center; margin: 12px 0 4px;
    position: relative;
}
.date-divider::before {
    content: ''; position: absolute;
    left: 20px; right: 20px; top: 50%;
    height: 1px; background: var(--border);
}
.date-divider span {
    position: relative; z-index: 1;
    background: var(--surface);
    font-size: 11px; color: var(--t3); font-weight: 500;
    padding: 0 12px;
}

/* ── CONNECTING ── */
.connecting {
    text-align: center; font-size: 12px; color: #92400e;
    padding: 7px; background: #fffbeb;
    border-bottom: 1px solid #fde68a; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; gap: 6px;
}
.connecting::before {
    content: '';
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid #f59e0b; border-top-color: transparent;
    animation: spin .8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.connecting.hidden { display: none; }

/* ── MESSAGES ── */
#messageArea {
    list-style: none; flex: 1; min-height: 0;
    overflow-y: auto; padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 2px;
    scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    background: #f8f9ff;
}
#messageArea::-webkit-scrollbar { width: 4px; }
#messageArea::-webkit-scrollbar-thumb { background: #d1d5e8; border-radius: 4px; }

/* event messages */
.event-message { text-align: center; margin: 10px 0; }
.event-message p {
    display: inline-block; font-size: 11px; color: var(--t3);
    background: #fff; padding: 4px 14px;
    border-radius: 999px; border: 1px solid var(--border);
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

/* chat messages */
.chat-message {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 2px 0; animation: fadeUp .18s ease;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
}

.chat-message.own-message { flex-direction: row-reverse; }

/* consecutive messages — hide avatar if same sender as above */
.chat-message.same-sender i { visibility: hidden; }

.chat-message i {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-style: normal; font-size: 13px; font-weight: 700;
    color: #fff; text-transform: uppercase;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
}

.bubble-wrap { display: flex; flex-direction: column; max-width: 66%; }
.own-message .bubble-wrap { align-items: flex-end; }

.sender-name { font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 3px; padding: 0 6px; }

.chat-message p {
    background: #fff; color: var(--t1);
    padding: 10px 14px;
    border-radius: 18px 18px 18px 4px;
    font-size: 14px; line-height: 1.55;
    word-break: break-word;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    min-width: 0;
}
.own-message p {
    background: linear-gradient(135deg, #7c74ff, var(--accent-dark));
    color: #fff; border-color: transparent;
    border-radius: 18px 18px 4px 18px;
    box-shadow: 0 4px 12px rgba(108,99,255,.28);
}

/* tail details */
.chat-message:not(.own-message) p { border-bottom-left-radius: 4px; }
.own-message p { border-bottom-right-radius: 4px; }

.msg-meta {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--t3);
    margin-top: 3px; padding: 0 6px;
}
.own-message .msg-meta { justify-content: flex-end; }

/* read tick */
.tick { color: #86efac; font-size: 11px; }

/* ── INPUT BAR ── */
.input-bar {
    padding: 12px 16px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
}

.input-row {
    display: flex; align-items: center; gap: 10px;
    background: #f0f2ff; border-radius: 16px;
    padding: 8px 8px 8px 16px;
    border: 2px solid transparent;
    transition: border-color .2s, box-shadow .2s, background .2s;
}
.input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
    background: #fff;
}

.you-avatar {
    width: 30px; height: 30px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0; text-transform: uppercase;
    background: var(--accent);
    box-shadow: 0 2px 6px rgba(108,99,255,.30);
}

.msg-input {
    flex: 1; min-width: 0; border: none; background: transparent;
    font-size: 14px; font-family: var(--font);
    color: var(--t1); outline: none; padding: 4px 0;
    -webkit-appearance: none; appearance: none;
}
.msg-input::placeholder { color: var(--t3); }

/* char counter */
#charCount {
    font-size: 11px; color: var(--t3); flex-shrink: 0;
    transition: color .2s;
}
#charCount.warn { color: #f59e0b; }
#charCount.limit { color: #ef4444; font-weight: 600; }

.send-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #7c74ff, var(--accent-dark));
    color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 12px rgba(108,99,255,.35);
    -webkit-appearance: none; appearance: none;
}
.send-btn:hover { opacity: .9; box-shadow: 0 6px 16px rgba(108,99,255,.45); }
.send-btn:active { transform: scale(.9); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
    #chat-page { padding: 0; align-items: stretch; }
    .chat-container { border-radius: 0; max-height: 100%; }
    .login-card { padding: 40px 24px 36px; }
    .bubble-wrap { max-width: 80%; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="username-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-wrap">💬</div>
            <h1>chatApp</h1>
            <p class="login-subtitle">Jump in — no account, no sign-up</p>
        </div>
        <form id="usernameForm" name="usernameForm">
            <div class="input-with-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" id="name" placeholder="Choose a username..." autocomplete="off" class="login-input" maxlength="30" />
            </div>
            <button type="submit" class="login-btn">Start Chatting →</button>
        </form>
        <div class="login-footer">
            <span></span> Real-time <span></span> No login <span></span> Open source
        </div>
    </div>
</div>

<!-- CHAT -->
<div id="chat-page" class="hidden">
    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="header-avatar">💬</div>
                <div>
                    <div class="header-title">chatApp</div>
                    <div class="header-status" id="headerStatus">Connecting...</div>
                </div>
            </div>
            <div class="header-right">
                <div class="online-pill">
                    <span class="online-dot"></span>
                    <span id="onlineCount">0</span>&nbsp;online
                </div>
            </div>
        </div>

        <!-- Connecting banner -->
        <div class="connecting" id="connectingBanner">Connecting to server...</div>

        <!-- Messages -->
        <ul id="messageArea"></ul>

        <!-- Input -->
        <div class="input-bar">
            <form id="messageForm" name="messageForm">
                <div class="input-row">
                    <div class="you-avatar" id="youAvatar"></div>
                    <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="msg-input" maxlength="500"/>
                    <span id="charCount"></span>
                    <button type="submit" class="send-btn">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
